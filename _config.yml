title: "FrameCoach Blog — Filmmaking Tips, Camera Settings & Visual Storytelling"
description: "Learn filmmaking, master camera settings, and level up your visual storytelling. The official blog from FrameCoach — the filmmaker app for indie creators."
url: "https://theshumba.github.io"
baseurl: "/framecoach-blog"
permalink: /:title/

author:
  name: "Melusi"
  url: "https://framecoach.io"
  bio: "Founder of FrameCoach. Helping indie filmmakers and content creators master their camera through real-time coaching."
  twitter: "framecoachapp"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Melusi"
      image: "/assets/images/default-og.png"

collections:
  pages:
    output: true
    permalink: /:title/

sass:
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - scripts/
