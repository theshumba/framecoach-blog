name: Publish Scheduled Posts

# Runs daily at 8am UTC — moves posts from _drafts to _posts when their date arrives
on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8:00 UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish due drafts
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Today is $TODAY"

          if [ -d "_drafts" ]; then
            for draft in _drafts/*.md; do
              [ -f "$draft" ] || continue

              # Extract date from filename (YYYY-MM-DD-slug.md)
              FILENAME=$(basename "$draft")
              POST_DATE=$(echo "$FILENAME" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')

              if [ -n "$POST_DATE" ] && [ "$POST_DATE" \<= "$TODAY" ]; then
                echo "Publishing: $FILENAME (scheduled for $POST_DATE)"
                mv "$draft" "_posts/$FILENAME"
              else
                echo "Not yet: $FILENAME (scheduled for $POST_DATE)"
              fi
            done
          fi

      - name: Commit and push
        run: |
          git config user.name "FrameCoach Bot"
          git config user.email "bot@framecoach.io"
          git add -A
          if git diff --staged --quiet; then
            echo "No posts to publish today"
          else
            git commit -m "Auto-publish scheduled posts for $(date +%Y-%m-%d)"
            git push
          fi
